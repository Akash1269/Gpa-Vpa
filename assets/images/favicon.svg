<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#2E8BF7"/>
      <stop offset="45%" stop-color="#1A6DE0"/>
      <stop offset="100%" stop-color="#0F47A0"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.6" cy="0.3" r="0.5">
      <stop offset="0%" stop-color="rgba(100,180,255,0.2)"/>
      <stop offset="100%" stop-color="rgba(100,180,255,0)"/>
    </radialGradient>
    <linearGradient id="capGrad" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="50%" stop-color="#F0F2F5"/>
      <stop offset="100%" stop-color="#D8DCE2"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE082"/>
      <stop offset="50%" stop-color="#FFD54F"/>
      <stop offset="100%" stop-color="#F9A825"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <rect width="512" height="512" fill="url(#glow)"/>

  <!-- Graduation Cap — large and centered -->
  <g transform="translate(256, 190)">
    <!-- Cap board -->
    <polygon points="0,-55 160,0 0,55 -160,0" fill="url(#capGrad)"/>
    <!-- Highlight -->
    <polygon points="0,-55 160,0 0,-5 -160,0" fill="rgba(255,255,255,0.3)"/>
    <!-- Shadow -->
    <polygon points="0,55 160,0 160,8 0,63" fill="rgba(0,0,0,0.07)"/>
    <polygon points="0,55 -160,0 -160,8 0,63" fill="rgba(0,0,0,0.035)"/>
    <!-- Gold button -->
    <circle cx="0" cy="-55" r="12" fill="url(#gold)"/>
    <circle cx="-2" cy="-58" r="3" fill="rgba(255,255,255,0.5)"/>
    <!-- Tassel -->
    <line x1="0" y1="-43" x2="110" y2="5" stroke="#FFCA28" stroke-width="5" stroke-linecap="round"/>
    <circle cx="110" cy="5" r="6" fill="url(#gold)"/>
    <line x1="110" y1="11" x2="110" y2="48" stroke="#FFCA28" stroke-width="5" stroke-linecap="round"/>
    <line x1="110" y1="48" x2="100" y2="62" stroke="#FFCA28" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="110" y1="48" x2="110" y2="65" stroke="#FFCA28" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="110" y1="48" x2="120" y2="62" stroke="#FFCA28" stroke-width="3.5" stroke-linecap="round"/>
  </g>

  <!-- "GPA" text — bold, centered below cap -->
  <text x="256" y="380" font-family="Arial, Helvetica, sans-serif" font-size="120" font-weight="900" fill="white" text-anchor="middle" letter-spacing="6">GPA</text>
</svg>
